# Firebase App Hosting — one build for frontend + API (Next.js)
# See: https://firebase.google.com/docs/app-hosting/configure
#
# Environment variables:
#   BUILD  = available during Cloud Build (e.g. next build). Required for NEXT_PUBLIC_* used in client code.
#   RUNTIME = available when the app runs on Cloud Run. Use for API keys and server-only config.

runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 50
  memoryMiB: 512
  cpu: 1

env:
  # ---- Required at BUILD and RUNTIME ----
  - variable: GOOGLE_CLOUD_PROJECT
    value: openg-hack26bar-512
    availability:
      - BUILD
      - RUNTIME

  - variable: NAC_API_KEY
    secret: nac-api-key
    availability:
      - RUNTIME
